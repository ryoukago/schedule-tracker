<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Open Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#fdf6ec;
  --surface:#fff8f0;
  --surface2:#feecd4;
  --border:#f0d5b0;
  --accent:#e8721a;
  --accent2:#c95a0a;
  --text:#2d1a06;
  --muted:#9a6b3c;
}

body{
  background:var(--bg);
  font-family:'Syne',sans-serif;
  margin:0;
}

main{
  max-width:900px;
  margin:0 auto;
  padding:30px;
}

header{
  border-bottom:2px solid var(--border);
  padding:20px;
  display:flex;
  justify-content:center;   /* ✅ center everything */
  align-items:center;
  position:relative;        /* needed for optional right text */
}

.header-center{
  display:flex;
  align-items:center;
  justify-content:center;  /* ✅ force center */
  gap:10px;
}

.logo-dot{
  width:10px;
  height:10px;
  background:var(--accent);
  border-radius:50%;
}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:25px;
  margin-top:20px;
}

.card-title{
  font-size:11px;
  letter-spacing:2px;
  color:var(--muted);
  margin-bottom:15px;
}

#drop-zone{
  border:2px dashed var(--border);
  padding:40px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}

.filter-row{
  display:flex;
  gap:15px;
  align-items:flex-end;
  flex-wrap:wrap;
}

select{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px;
  flex:1;                 /* ✅ makes it wide */
}

button{
  background:var(--accent);
  color:white;
  border:none;
  padding:12px 24px;
  border-radius:8px;
  cursor:pointer;
  white-space:nowrap;     /* ✅ prevents wrapping */
}

button:hover{
  background:var(--accent2);
}

/* ✅ FILE CHIP */
.file-chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:var(--surface2);
  border:1px solid var(--border);
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  margin-top:10px;
}

/* ✅ TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

td{
  border:1px solid var(--border);
  padding:8px;
  font-size:13px;
}

tr:first-child{
  font-weight:bold;
  background:var(--surface2);
}

header h1{
  margin:0;
  text-align:center;
  width:100%;
}

.header-inner{
  max-width:900px;
  margin:0 auto;
  width:100%;
}
  
</style>
  
</head>

<body>

<header>
  <div class="header-inner">
    <div class="header-center">
      <span class="logo-dot"></span>
      <h1>Schedule Open Tracker</h1>
    </div>
  </div>
</header>

<main>

<!-- ✅ UPLOAD -->
<div class="card">
  <div class="card-title">01 / UPLOAD CSV FILES</div>

  <div id="drop-zone">
    <input type="file" id="file-input" accept=".csv" hidden>

    <div style="font-size:30px;">📂</div>
    <div style="font-weight:700; margin-top:10px;">
      Drop CSV files here or click to browse
    </div>
    <div style="font-size:12px; color:var(--muted);">
      CSV only · Multiple files supported
    </div>
  </div>

  <!-- ✅ FILE CHIP AREA -->
  <div id="file-list"></div>
</div>

<!-- ✅ FILTER -->
<div class="card">
  <div class="card-title">02 / FILTER TIME</div>

  <div class="filter-row">
    <select id="start"></select>
    <select id="end"></select>
    <button id="apply">Apply</button>
  </div>
</div>

<!-- ✅ RESULTS -->
<div id="output"></div>

</main>

<script>

let data = [];

// ✅ TIME DROPDOWN
const times = [];
for(let h=0; h<24; h++){
  for(let m of [0,30]){
    let ampm = h < 12 ? "AM" : "PM";
    let hr = h % 12 || 12;
    let min = m===0 ? "00":"30";
    times.push(`${hr}:${min} ${ampm}`);
  }
}

const start = document.getElementById("start");
const end = document.getElementById("end");

times.forEach((t,i)=>{
  start.add(new Option(t,i));
  end.add(new Option(t,i));
});


// ✅ UPLOAD
const drop = document.getElementById("drop-zone");
const input = document.getElementById("file-input");

drop.addEventListener("click",()=>input.click());
drop.addEventListener("dragover",(e)=> e.preventDefault());

drop.addEventListener("drop",(e)=>{
  e.preventDefault();
  handle(e.dataTransfer.files[0]);
});

input.addEventListener("change",(e)=>{
  handle(e.target.files[0]);
});


// ✅ PARSE CSV
function handle(file){
  if(!file) return;

  document.getElementById("file-list").innerHTML = `
    <div class="file-chip">
      📄 ${file.name}
      <span style="cursor:pointer;" onclick="removeFile()">✕</span>
    </div>
  `;

  const reader = new FileReader();

  reader.onload = function(e){
    const rows = e.target.result.trim().split("\n");

    const headers = rows[0].split(",");
    data = rows.slice(1).map(r=>{
      const values = r.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g)?.map(v => v.replace(/^"|"$/g, ""));
      let obj = {};
      headers.forEach((h,i)=>{
        obj[h.trim()] = values[i]?.trim();
      });
      return obj;
    });

    alert("✅ File loaded. Click Apply.");
  };

  reader.readAsText(file);
}


// ✅ REMOVE FILE
function removeFile(){
  data = [];
  document.getElementById("file-list").innerHTML = "";
  document.getElementById("output").innerHTML = "";
}


// ✅ APPLY FILTER
document.getElementById("apply").addEventListener("click", applyFilter);

function applyFilter(){

  if(data.length === 0){
    alert("Upload CSV first");
    return;
  }
console.log(Object.keys(data[0]));
  console.log([...new Set(data.map(r => r["Scheduled Activities"]))]);
  
    let result = data.filter(row => {
  const act = row["Scheduled Activities"] || "";

  return act.includes("fax") || 
         act.includes("crg") || 
         act.includes("ogs") || 
         act.includes("time off");
});

let mapped = result.map(row => ({
  EID: row["Agent ID"],
  Name: row["Agent Name"],
  Activity: row["Scheduled Activities"],
  ScheduledTime: row["Scheduled Time"],
}));


  const startVal = start.options[start.selectedIndex].text;
  const endVal = end.options[end.selectedIndex].text;

  renderDashboard(mapped, mapped.length, startVal, endVal);

}



// ✅ DASHBOARD RENDER
function renderDashboard(list, total, startVal, endVal){

  let html = `

  <div class="card" style="display:flex; gap:15px;">
    <div style="flex:1;">
      <div class="card-title">MATCHING ROWS</div>
      <div style="color:var(--accent); font-size:22px;">${list.length}</div>
    </div>

    <div style="flex:1;">
      <div class="card-title">TIME RANGE</div>
      <div style="color:var(--accent); font-weight:700;">
        ${startVal} – ${endVal}
      </div>
    </div>
  </div>

  <div class="card">

    <div class="card-title">03 / FILTERED SCHEDULE</div>

    <div style="margin-bottom:15px; display:flex; gap:10px; flex-wrap:wrap;">

      <div style="flex:1;">
        <b>${list.length}</b> matching schedule rows
      </div>

      <input id="searchBox" placeholder="Search name, EID..."
        style="padding:8px; border:1px solid var(--border); border-radius:8px;" />

      <button onclick="copyAll()">📋 Copy All</button>
      <button onclick="copySelected()">📄 Copy Selected</button>
      <button onclick="exportCSV()">⬇ Export CSV</button>

    </div>
  `;

  if(list.length === 0){

    html += `
      <div style="text-align:center; padding:40px; color:var(--muted);">
        <div style="font-size:32px;">🔍</div>
        No matching scheduled activities.
      </div>
    `;

  } else {

    html += `
      <table>
        <tr>
          <td></td>
          <td>#</td>
          <td>EID</td>
          <td>NAME</td>
          <td>ACTIVITY</td>
          <td>SCHEDULED</td>
        </tr>
    `;

    list.forEach((e,i)=>{
      html += `
        <tr>
          <td><input type="checkbox" class="rowCheck"></td>
          <td>${i+1}</td>
          <td>${e.EID}</td>
          <td>${e.Name}</td>
          <td>${e.Activity}</td>
          <td>${e.ScheduledTime || "-"}</td>
        </tr>
      `;
    });

    html += "</table>";
  }

  html += "</div>";

  document.getElementById("output").innerHTML = html;
}


// ✅ SEARCH
document.addEventListener("input", function(e){
  if(e.target.id === "searchBox"){
    const val = e.target.value.toLowerCase();
    document.querySelectorAll("table tr").forEach((row,i)=>{
      if(i === 0) return;
      row.style.display = row.innerText.toLowerCase().includes(val) ? "" : "none";
    });
  }
});


// ✅ COPY ALL
function copyAll(){
  let text = "";
  document.querySelectorAll("table tr").forEach((row,i)=>{
    if(i === 0) return;
    text += row.innerText + "\n";
  });
  navigator.clipboard.writeText(text);
  alert("Copied all ✅");
}


// ✅ COPY SELECTED
function copySelected(){
  let text = "";

  document.querySelectorAll(".rowCheck").forEach((check)=>{
    if(check.checked){
      text += check.closest("tr").innerText + "\n";
    }
  });

  if(text === ""){
    alert("No rows selected ❌");
    return;
  }

  navigator.clipboard.writeText(text);
  alert("Copied selected ✅");
}


// ✅ EXPORT CSV
function exportCSV(){

  let csv = "EID,NAME,ACTIVITY,SCHEDULED\n";

  document.querySelectorAll("table tr").forEach((row,i)=>{
    if(i === 0) return;

    const cols = row.querySelectorAll("td");

    csv += [
      cols[2]?.innerText,
      cols[3]?.innerText,
      cols[4]?.innerText,
      cols[5]?.innerText,
    ].join(",") + "\n";
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "filtered_schedule.csv";
  a.click();
}

</script>
  
</body>
</html>
