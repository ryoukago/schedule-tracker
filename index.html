<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Open Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#fdf6ec;
  --surface:#fff8f0;
  --surface2:#feecd4;
  --border:#f0d5b0;
  --accent:#e8721a;
  --accent2:#c95a0a;
  --text:#2d1a06;
  --muted:#9a6b3c;
}

body{
  background:var(--bg);
  font-family:'Syne',sans-serif;
  margin:0;
}

main{
  max-width:900px;
  margin:0 auto;
  padding:30px;
}

header{
  border-bottom:2px solid var(--border);
  padding:20px;
  display:flex;
  justify-content:center;   /* ✅ center everything */
  align-items:center;
  position:relative;        /* needed for optional right text */
}

.header-center{
  display:flex;
  align-items:center;
  justify-content:center;  /* ✅ force center */
  gap:10px;
}

.logo-dot{
  width:10px;
  height:10px;
  background:var(--accent);
  border-radius:50%;
}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:25px;
  margin-top:20px;
}

.card-title{
  font-size:11px;
  letter-spacing:2px;
  color:var(--muted);
  margin-bottom:15px;
}

#drop-zone{
  border:2px dashed var(--border);
  padding:40px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}

.filter-row{
  display:flex;
  gap:15px;
  align-items:center;
}

select{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px;
}

button{
  background:var(--accent);
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:var(--accent2);
}

/* ✅ FILE CHIP */
.file-chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:var(--surface2);
  border:1px solid var(--border);
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  margin-top:10px;
}

/* ✅ TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

td{
  border:1px solid var(--border);
  padding:8px;
  font-size:13px;
}

tr:first-child{
  font-weight:bold;
  background:var(--surface2);
}

header h1{
  margin:0;
  text-align:center;
  width:100%;
}

.header-inner{
  max-width:900px;
  margin:0 auto;
  width:100%;
}
  
</style>
  
</head>

<body>

<header>
  <div class="header-inner">
    <div class="header-center">
      <span class="logo-dot"></span>
      <h1>Schedule Open Tracker</h1>
    </div>
  </div>
</header>

<main>

<!-- ✅ UPLOAD -->
<div class="card">
  <div class="card-title">01 / UPLOAD CSV FILES</div>

  <div id="drop-zone">
    <input type="file" id="file-input" accept=".csv" hidden>

    <div style="font-size:30px;">📂</div>
    <div style="font-weight:700; margin-top:10px;">
      Drop CSV files here or click to browse
    </div>
    <div style="font-size:12px; color:var(--muted);">
      CSV only · Multiple files supported
    </div>
  </div>

  <!-- ✅ FILE CHIP AREA -->
  <div id="file-list"></div>
</div>

<!-- ✅ FILTER -->
<div class="card">
  <div class="card-title">02 / FILTER TIME</div>

  <div class="filter-row">
    <select id="start"></select>
    <select id="end"></select>
    <button id="apply">Apply</button>
  </div>
</div>

<!-- ✅ RESULTS -->
<div id="output"></div>

</main>

<script>

// ✅ dropdown
const times = [];
for(let h=0; h<24; h++){
  for(let m of [0,30]){
    let ampm = h < 12 ? "AM" : "PM";
    let hr = h % 12 || 12;
    let min = m===0 ? "00":"30";
    times.push(`${hr}:${min} ${ampm}`);
  }
}

const start = document.getElementById("start");
const end = document.getElementById("end");

times.forEach((t,i)=>{
  start.add(new Option(t,i));
  end.add(new Option(t,i));
});

// ✅ upload logic
const drop = document.getElementById("drop-zone");
const input = document.getElementById("file-input");

drop.addEventListener("click",()=>input.click());

drop.addEventListener("dragover",(e)=>{
  e.preventDefault();
});

drop.addEventListener("drop",(e)=>{
  e.preventDefault();
  handle(e.dataTransfer.files[0]);
});

input.addEventListener("change",(e)=>{
  handle(e.target.files[0]);
});

// ✅ FILE HANDLE
function handle(file){
  if(!file) return;

  // ✅ show file chip
  document.getElementById("file-list").innerHTML = `
    <div class="file-chip">
      📄 ${file.name}
      <span style="cursor:pointer;" onclick="removeFile()">✕</span>
    </div>
  `;

  const reader = new FileReader();

  reader.onload = function(e){
    displayCSV(e.target.result);
  };

  reader.readAsText(file);
}

function removeFile(){
  document.getElementById("file-list").innerHTML = "";
  document.getElementById("output").innerHTML = "";
}

// ✅ DISPLAY CSV
function displayCSV(text){

  const rows = text.split("\n");

  let html = `
    <div class="card">
      <div class="card-title">03 / RESULTS</div>
      <table>
  `;

  rows.forEach(r=>{
    html += "<tr>";
    r.split(",").forEach(c=>{
      html += `<td>${c}</td>`;
    });
    html += "</tr>";
  });

  html += "</table></div>";

  document.getElementById("output").innerHTML = html;
}

</script>

</body>
</html>
