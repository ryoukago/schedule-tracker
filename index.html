<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Open Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#fdf6ec;
  --surface:#fff8f0;
  --surface2:#feecd4;
  --border:#f0d5b0;
  --accent:#e8721a;
  --accent2:#c95a0a;
  --accent3:#f5a623;
  --text:#2d1a06;
  --muted:#9a6b3c;
}

/* RESET */
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

/* BODY */
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Syne',sans-serif;
}

/* MAIN */
main{
  max-width:700px;
  margin:0 auto;
  padding:40px 20px;
}

/* HEADER */
header{
  border-bottom:2px solid var(--border);
  padding:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.logo-dot{
  width:10px;
  height:10px;
  background:var(--accent);
  border-radius:50%;
  margin-right:10px;
}

h1{
  color:var(--accent2);
}

/* Right side text */
.header-sub{
  position:absolute;
  right:20px;
  font-size:12px;
  color:var(--muted);
}

/* CARDS */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:25px;
  margin-top:25px;
}

/* CARD TITLE */
.card-title{
  font-size:11px;
  letter-spacing:2px;
  color:var(--muted);
  margin-bottom:15px;
}

/* DROP ZONE */
#drop-zone{
  border:2px dashed #e0b88c;
  padding:50px;
  text-align:center;
  border-radius:12px;
  background:#f7ecdd;
  cursor:pointer;
  transition:0.2s;
}

#drop-zone:hover{
  border-color:var(--accent);
  background:rgba(232,114,26,0.05);
}

/* FILTER */
.filter-row{
  display:flex;
  gap:20px;
  align-items:end;
}

/* FIELD */
.field{
  display:flex;
  flex-direction:column;
}

.field label{
  font-size:11px;
  margin-bottom:5px;
  color:var(--muted);
}

/* DROPDOWN */
select{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px;
  width:220px;
  cursor:pointer;
}

/* BUTTON */
button{
  background:var(--accent);
  color:white;
  border:none;
  padding:12px 25px;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  background:var(--accent2);
}
</style>

</head>

<body>

<header>
  <span class="logo-dot"></span>
  <h1>Schedule Open Tracker</h1>
  <span class="header-sub">Roster-matched · 30-min intervals</span>
</header>

<main>

<div class="card">
  <div class="card-title">01 / UPLOAD SCHEDULE CSV FILES</div>

  <div id="drop-zone">
    <input type="file" id="file-input" accept=".csv" hidden>

    <div style="font-size:28px;">📂</div>
    <div style="font-weight:700; margin-top:10px;">
      Drop CSV files here, or click to browse
    </div>
    <div style="font-size:12px; color:var(--muted);">
      Multiple files supported · Columns: Date, Agent ID, Agent Name
    </div>
  </div>
</div>

<div class="card">
  <div class="card-title">02 / FILTER BY TIME RANGE</div>

  <div class="filter-row">
    <div class="field">
      <label>START TIME</label>
      <select id="start"></select>
    </div>

    <div class="field">
      <label>END TIME</label>
      <select id="end"></select>
    </div>

    <button id="apply">Apply Filter</button>
  </div>
</div>

</main>

<script>
// ✅ YOUR JS — unchanged
const times=[];
for(let h=0;h<24;h++){
  for(let m of [0,30]){
    let ap=h<12?"AM":"PM";
    let hr=h%12||12;
    let min=m===0?"00":"30";
    times.push(`${hr}:${min} ${ap}`);
  }
}

const start=document.getElementById("start");
const end=document.getElementById("end");

times.forEach((t,i)=>{
  start.add(new Option(t,i));
  end.add(new Option(t,i));
});
</script>

</body>
</html>
``
