<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Schedule Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>● Schedule Open Tracker</h1>
    <p>Roster-matched · 30-min intervals</p>
  </header>

  <main>
    <section class="card">
      <h3>01 / UPLOAD SCHEDULE CSV FILES</h3>

      <div class="upload-box">
        <label for="csvFile" class="custom-upload">
          <div class="icon">📂</div>
          <p><strong>Drop CSV files here, or click to browse</strong></p>
          <span>CSV only • Columns: Date, Agent ID, Agent Name</span>
        </label>

        <input type="file" id="csvFile" acceept=".csv" hidden>
      </div>
      <div id="output">
      </div>
    </section>
    <section class="card">
  <h3>02 / FILTER BY TIME RANGE</h3>

  <div class="filters">
    <div>
      <label>START TIME</label>
      <select>
        <option>12:00 AM</option>
      </select>
    </div>

    <div>
      <label>END TIME</label>
      <select>
        <option>9:00 PM</option>
      </select>
    </div>

    <button>Apply Filter</button>
  </div>
</section>
  </main>

</body>
</html>
