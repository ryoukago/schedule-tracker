<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Schedule Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>● Schedule Open Tracker</h1>
    <p>Roster-matched · 30-min intervals</p>
  </header>

  <main>
    <section class="card">
      <h3>01 / UPLOAD SCHEDULE CSV FILES</h3>

      <div class="upload-box">
        <div class="icon">📂</div>
        <p>Drop CSV files here, or click to browse</p>
        <span>Multiple files supported · Columns: Date, Agent ID, Agent Name</span>
      </div>
    </section>
  </main>

</body>
</html>
