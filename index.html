<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Open Tracker</title>

https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap

<style>
:root{
  --bg:#fdf6ec;
  --surface:#fff8f0;
  --surface2:#feecd4;
  --border:#f0d5b0;
  --accent:#e8721a;
  --accent2:#c95a0a;
  --text:#2d1a06;
  --muted:#9a6b3c;
}

body{
  background:var(--bg);
  font-family:'Syne',sans-serif;
  margin:0;
}

/* CENTER LAYOUT */
main {
  max-width: 1100px;
  margin: 0 auto;
}

/* HEADER */
header{
  border-bottom:2px solid var(--border);
  padding:20px 40px;
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-dot{
  width:10px;
  height:10px;
  background:var(--accent);
  border-radius:50%;
}

/* CARD */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:25px;
  margin:30px 0;
}

/* DROP ZONE */
#drop-zone{
  border:2px dashed var(--border);
  padding:50px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

#drop-zone:hover,
#drop-zone.dragover{
  border-color:var(--accent);
  background:rgba(232,114,26,0.05);
}

/* FILTER ROW */
.filter-row {
  display:flex;
  gap:15px;
  align-items:center;
}

/* SELECT */
select{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px;
  cursor:pointer;
}

/* BUTTON */
button{
  background:var(--accent);
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:var(--accent2);
}
</style>

</head>

<body>

<header>
  <span class="logo-dot"></span>
  <h1>Schedule Open Tracker</h1>
</header>

<main>

<div class="card">
  <h3>Upload CSV Files</h3>

  <div id="drop-zone">
    <input type="file" id="file-input" accept=".csv" style="display:none;">

    <div style="font-size:30px;">📂</div>
    <div style="font-weight:700; margin-top:10px;">
      Drop CSV files here or click to browse
    </div>
    <div style="font-size:12px; color:#9a6b3c;">
      CSV only · Multiple files supported
    </div>

  </div>
</div>

<div class="card">
  <h3>Filter Time</h3>

  <div class="filter-row">
    <select id="start"></select>
    <select id="end"></select>
    <button id="apply">Apply</button>
  </div>
</div>

<div id="output"></div>

</main>

<script>

// dropdown values
const times = [];
for(let h=0; h<24; h++){
  for(let m of [0,30]){
    let ampm = h < 12 ? "AM" : "PM";
    let hr = h % 12 || 12;
    let min = m===0 ? "00":"30";
    times.push(`${hr}:${min} ${ampm}`);
  }
}

const start = document.getElementById("start");
const end = document.getElementById("end");

times.forEach((t,i)=>{
  start.add(new Option(t,i));
  end.add(new Option(t,i));
});

// drag drop
const drop = document.getElementById("drop-zone");
const input = document.getElementById("file-input");

drop.addEventListener("click",()=>input.click());

drop.addEventListener("dragover",(e)=>{
  e.preventDefault();
  drop.classList.add("dragover");
});

drop.addEventListener("dragleave",()=>{
  drop.classList.remove("dragover");
});

drop.addEventListener("drop",(e)=>{
  e.preventDefault();
  drop.classList.remove("dragover");
  handle(e.dataTransfer.files[0]);
});

input.addEventListener("change",(e)=>{
  handle(e.target.files[0]);
});

function handle(file){
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    const text = e.target.result;
    const rows = text.split("\n");

    let html = "<table border='1'>";

    rows.forEach(r=>{
      html += "<tr>";
      r.split(",").forEach(c=>{
        html += `<td>${c}</td>`;
      });
      html += "</tr>";
    });

    html += "</table>";

    document.getElementById("output").innerHTML = html;
  };

  reader.readAsText(file);
}

</script>

</body>
</html>
