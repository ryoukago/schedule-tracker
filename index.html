<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Schedule Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>● Schedule Open Tracker</h1>
    <p>Roster-matched · 30-min intervals</p>
  </header>

  <main>
    <section class="card">
      <h3>01 / UPLOAD SCHEDULE CSV FILES</h3>

      
  <div class="upload-box" id="drop-area">
    <label for="csvFile" class="custom-upload">
      <div class="icon">📂</div>
      <p><strong>Drop CSV files here, or click to browse</strong></p>
      <span>CSV only • Columns: Date, Agent ID, Agent Name</span>
    </label>

    <input type="file" id="csvFile" accept=".csv" hidden>
    </div>
      
    <div id="output">
  </div>

    </section>
    <section class="card">
  <h3>02 / FILTER BY TIME RANGE</h3>

  <div class="filters">
    <div>
      <label>START TIME</label>
      <select>
        <option>12:00 AM</option>
      </select>
    </div>

    <div>
      <label>END TIME</label>
      <select>
        <option>9:00 PM</option>
      </select>
    </div>

    <button>Apply Filter</button>
  </div>
</section>
  </main>
  
<script>
const dropArea = document.getElementById("drop-area");
const fileInput = document.getElementById("csvFile");

// Click upload still works
fileInput.addEventListener("change", function(event) {
  handleFile(event.target.files[0]);
});

// DRAG EVENTS
dropArea.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropArea.style.background = "#f0d9b5";
});

dropArea.addEventListener("dragleave", () => {
  dropArea.style.background = "#f7ecdd";
});

dropArea.addEventListener("drop", (e) => {
  e.preventDefault();
  dropArea.style.background = "#f7ecdd";

  const file = e.dataTransfer.files[0];
  handleFile(file);
});

// FILE PROCESSING FUNCTION
function handleFile(file) {
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    const text = e.target.result;
    const rows = text.split("\n");

    let html = "<table border='1'>";

    rows.forEach(row => {
      html += "<tr>";

      const cols = row.split(",");

      cols.forEach(col => {
        html += `<td>${col}</td>`;
      });

      html += "</tr>";
    });

    html += "</table>";

    document.getElementById("output").innerHTML = html;
  };

  reader.readAsText(file);
}
</script>
  
</body>
</html>
